<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <style>
    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }
    .terminal { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
    .prompt { fill: #50fa7b; }
    .command { fill: #f8f8f2; }
    .dim { fill: #6272a4; }
    .red { fill: #ff5555; }
    .bold-red { fill: #ff5555; font-weight: bold; }
    .yellow { fill: #f1fa8c; }
    .green { fill: #50fa7b; }
    .orange { fill: #ffb86c; }
    .white { fill: #f8f8f2; }
    .cyan { fill: #8be9fd; }
  </style>
  
  <!-- Terminal window -->
  <rect width="800" height="520" rx="10" fill="#282a36"/>
  
  <!-- Title bar -->
  <rect width="800" height="32" rx="10" fill="#21222c"/>
  <rect y="20" width="800" height="12" fill="#21222c"/>
  <circle cx="20" cy="16" r="6" fill="#ff5555"/>
  <circle cx="40" cy="16" r="6" fill="#f1fa8c"/>
  <circle cx="60" cy="16" r="6" fill="#50fa7b"/>
  <text x="400" y="20" text-anchor="middle" class="terminal dim">roast — ~/project</text>
  
  <!-- Terminal content -->
  <g class="terminal" transform="translate(16, 56)">
    <!-- Command -->
    <text y="0"><tspan class="prompt">❯ </tspan><tspan class="command">roast examples/bad.js</tspan></text>
    
    <!-- Spinner line -->
    <text y="24" class="dim">⠋ Roasting bad.js...</text>
    
    <!-- Divider -->
    <text y="56" class="dim">────────────────────────────────────────────────────────</text>
    
    <!-- Header -->
    <text y="76" class="bold-red">  🔥 ROAST REPORT</text>
    
    <!-- Divider -->
    <text y="96" class="dim">────────────────────────────────────────────────────────</text>
    
    <!-- Content -->
    <text y="124" class="white">Oh. Oh no. WHAT IS THIS?!</text>
    <text y="148" class="white">This code is so RAW it's still mooing!</text>
    
    <text y="180" class="orange">🔪 The Pyramid of Doom (lines 3-15)</text>
    <text y="200" class="white">Five nested if-statements?! This isn't code,</text>
    <text y="220" class="white">it's a BLOODY RUSSIAN NESTING DOLL!</text>
    
    <text y="252" class="orange">🔪 `var` in 2026?!</text>
    <text y="272" class="white">Using var is like cooking with a MICROWAVE in a</text>
    <text y="292" class="white">Michelin kitchen! Use const and let, you donut!</text>
    
    <text y="324" class="orange">🔪 Single-letter variables</text>
    <text y="344" class="white">d? n? a? e? This reads like you're playing</text>
    <text y="364" class="white">bloody SCRABBLE, not writing code!</text>
    
    <text y="396" class="yellow">Rating: 2/10 — I've seen better code written</text>
    <text y="416" class="yellow">by a toaster. 🔥</text>
    
    <!-- Divider -->
    <text y="444" class="dim">────────────────────────────────────────────────────────</text>
  </g>
</svg>
